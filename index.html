<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ruleta de Notas</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0d14;
    --surface: #16161f;
    --surface2: #1e1e2a;
    --border: rgba(255,255,255,0.08);
    --accent: #f5c842;
    --accent2: #ff6b4a;
    --accent3: #5b8cff;
    --text: #f0f0f5;
    --text-muted: #8888aa;
    --green: #4bcc7e;
    --orange: #f5a623;
    --red: #ff5b5b;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Fondo animado */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(91,140,255,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(245,200,66,0.10) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 60% 10%, rgba(255,107,74,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .stars {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 12%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 40%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 70%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 85%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 45% 45%, rgba(245,200,66,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 25% 50%, rgba(91,140,255,0.5) 0%, transparent 100%);
  }

  .wrapper {
    position: relative; z-index: 1;
    max-width: 900px; margin: 0 auto;
    padding: 2rem 1.5rem 3rem;
    display: flex; flex-direction: column; align-items: center; gap: 2.5rem;
  }

  /* HEADER */
  header { text-align: center; }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 8vw, 5.5rem);
    letter-spacing: 0.06em;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 60%, #ff8c69 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 40px rgba(245,200,66,0.3));
  }
  header p {
    margin-top: 0.4rem;
    color: var(--text-muted);
    font-size: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* MAIN GRID */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 2rem;
    width: 100%;
    align-items: start;
  }

  /* WHEEL COLUMN */
  .wheel-col { display: flex; flex-direction: column; align-items: center; gap: 1rem; }

  .pointer-wrap { position: relative; }
  .pointer-wrap::before {
    content: '';
    position: absolute; left: 50%; transform: translateX(-50%) translateY(-6px);
    width: 0; height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-top: 40px solid var(--accent);
    filter: drop-shadow(0 4px 12px rgba(245,200,66,0.7));
    z-index: 10;
    animation: pointerPulse 2s ease-in-out infinite;
  }
  @keyframes pointerPulse {
    0%,100% { filter: drop-shadow(0 4px 12px rgba(245,200,66,0.7)); }
    50% { filter: drop-shadow(0 4px 20px rgba(245,200,66,1)); }
  }

  .wheel-ring {
    width: 360px; height: 360px;
    border-radius: 50%;
    padding: 8px;
    background: conic-gradient(from 0deg, #5b8cff, #f5c842, #ff6b4a, #4bcc7e, #5b8cff);
    box-shadow: 0 0 60px rgba(91,140,255,0.25), 0 0 120px rgba(245,200,66,0.1);
    animation: ringRotate 8s linear infinite;
  }
  @keyframes ringRotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .wheel-ring-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: var(--bg);
    padding: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    border-radius: 50%;
    display: block;
  }

  /* SPIN BUTTON */
  .spin-btn {
    position: relative;
    width: 260px;
    padding: 14px 0;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.12em;
    cursor: pointer;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: #0d0d14;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 30px rgba(245,200,66,0.4);
  }
  .spin-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
    border-radius: inherit;
  }
  .spin-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(245,200,66,0.5); }
  .spin-btn:active { transform: scale(0.97); }
  .spin-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .next-label {
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    min-height: 22px;
    letter-spacing: 0.04em;
  }
  .next-label strong { color: var(--accent); font-weight: 600; }

  /* RIGHT COLUMN */
  .right-col { display: flex; flex-direction: column; gap: 1.2rem; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.2rem 1.4rem;
    backdrop-filter: blur(12px);
  }

  .card-title {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 1rem;
    font-weight: 600;
  }

  /* Result card */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem 1.4rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .result-card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(245,200,66,0.08), transparent 70%);
    pointer-events: none;
  }
  .result-alumno { font-size: 13px; color: var(--text-muted); letter-spacing: 0.05em; }
  .result-nota-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    line-height: 1;
    color: var(--accent);
    filter: drop-shadow(0 0 20px rgba(245,200,66,0.5));
    transition: color 0.4s, filter 0.4s;
    letter-spacing: 0.04em;
  }
  .result-nota-big.verde { color: var(--green); filter: drop-shadow(0 0 20px rgba(75,204,126,0.5)); }
  .result-nota-big.naranja { color: var(--orange); filter: drop-shadow(0 0 20px rgba(245,166,35,0.5)); }
  .result-nota-big.rojo { color: var(--red); filter: drop-shadow(0 0 20px rgba(255,91,91,0.5)); }

  /* Input */
  .input-row { display: flex; gap: 8px; }
  .input-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-row input::placeholder { color: var(--text-muted); }
  .input-row input:focus { border-color: rgba(245,200,66,0.4); }
  .add-btn {
    width: 40px; height: 40px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #0d0d14;
    font-size: 22px;
    font-weight: 300;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  .add-btn:hover { background: #ffd566; }
  .add-btn:active { transform: scale(0.93); }

  /* List */
  .alumnos-list {
    display: flex; flex-direction: column; gap: 6px;
    max-height: 200px; overflow-y: auto;
    padding-right: 4px;
  }
  .alumnos-list::-webkit-scrollbar { width: 4px; }
  .alumnos-list::-webkit-scrollbar-track { background: transparent; }
  .alumnos-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .alumno-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px;
    background: var(--surface2);
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 13px;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .alumno-name { font-weight: 500; }
  .nota-pill {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    padding: 2px 10px;
    border-radius: 20px;
    letter-spacing: 0.06em;
  }
  .nota-pill.verde { background: rgba(75,204,126,0.15); color: var(--green); border: 1px solid rgba(75,204,126,0.3); }
  .nota-pill.naranja { background: rgba(245,166,35,0.15); color: var(--orange); border: 1px solid rgba(245,166,35,0.3); }
  .nota-pill.rojo { background: rgba(255,91,91,0.15); color: var(--red); border: 1px solid rgba(255,91,91,0.3); }
  .nota-pill.pending { color: var(--text-muted); font-size: 13px; font-family: 'DM Sans', sans-serif; letter-spacing: 0; }

  .item-right { display: flex; align-items: center; gap: 8px; }
  .del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 18px; line-height: 1;
    padding: 0 2px;
    transition: color 0.2s;
  }
  .del-btn:hover { color: var(--red); }

  .empty-msg {
    font-size: 13px; color: var(--text-muted);
    text-align: center; padding: 16px 0;
  }

  /* Action buttons */
  .btn-row { display: flex; gap: 8px; }
  .btn-secondary {
    flex: 1;
    padding: 9px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-secondary:hover { background: var(--surface); border-color: rgba(255,255,255,0.15); }

  /* Confetti burst */
  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
  .confetti-piece {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 2px;
    animation: confettiFall 1.2s ease-out forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(300px) rotate(720deg); opacity: 0; }
  }

  /* Responsive */
  @media (max-width: 680px) {
    .main-grid { grid-template-columns: 1fr; }
    .wheel-ring { width: 300px; height: 300px; }
  }
</style>
</head>
<body>
<div class="stars"></div>
<div class="wrapper">

  <header>
    <h1>Ruleta de Notas</h1>
    <p>Asigna calificaciones al azar &nbsp;✦&nbsp; 3.2 – 4.6</p>
  </header>

  <div class="main-grid">

    <!-- WHEEL -->
    <div class="wheel-col">
      <div class="pointer-wrap" style="height:8px;width:40px;"></div>
      <div class="wheel-ring">
        <div class="wheel-ring-inner">
          <canvas id="wheel" width="332" height="332"></canvas>
        </div>
      </div>
      <div class="next-label" id="nextLabel">Agrega un alumno y gira ✦</div>
      <button class="spin-btn" id="spinBtn" onclick="spin()">⬤ &nbsp;GIRAR</button>
    </div>

    <!-- RIGHT -->
    <div class="right-col">

      <!-- Result -->
      <div class="result-card">
        <div class="card-title">Resultado</div>
        <div class="result-alumno" id="resultAlumno">— ningún alumno —</div>
        <div class="result-nota-big" id="resultNota">—</div>
      </div>

      <!-- Add alumno -->
      <div class="card">
        <div class="card-title">Alumnos</div>
        <div class="input-row">
          <input type="text" id="alumnoInput" placeholder="Nombre del alumno…"
            onkeydown="if(event.key==='Enter')addAlumno()" autocomplete="off"/>
          <button class="add-btn" onclick="addAlumno()">+</button>
        </div>
      </div>

      <!-- List -->
      <div class="card">
        <div class="card-title">Lista de Calificaciones</div>
        <div class="alumnos-list" id="alumnosList">
          <div class="empty-msg">Aún no hay alumnos 📋</div>
        </div>
        <div class="btn-row" style="margin-top:12px;">
          <button class="btn-secondary" onclick="limpiarNotas()">Limpiar notas</button>
          <button class="btn-secondary" onclick="exportar()">Exportar CSV</button>
        </div>
      </div>

    </div>
  </div>
</div>
<div class="confetti-container" id="confettiContainer"></div>

<script>
const NOTAS = [];
for (let i = 32; i <= 46; i++) NOTAS.push(parseFloat((i / 10).toFixed(1)));

const SEG_COLORS = [
  '#5b8cff','#f5c842','#ff6b4a','#4bcc7e','#c97aff',
  '#ff9f43','#48dbfb','#ff6b9d','#54a0ff','#1dd1a1',
  '#ffd32a','#ff4757','#7bed9f','#eccc68','#a29bfe'
];

let alumnos = [];
let spinning = false;
let angle = 0;

function notaClass(n) {
  if (n >= 4.2) return 'verde';
  if (n >= 3.7) return 'naranja';
  return 'rojo';
}

function drawWheel(a) {
  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const S = canvas.width;
  const cx = S/2, cy = S/2, r = S/2 - 2;
  ctx.clearRect(0,0,S,S);
  const n = NOTAS.length;
  const arc = (2*Math.PI)/n;
  for (let i=0; i<n; i++) {
    const s = a + i*arc, e = s+arc;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,s,e);
    ctx.closePath();
    ctx.fillStyle = SEG_COLORS[i];
    ctx.fill();
    // subtle inner shadow line
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Label
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(s+arc/2);
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.font = '700 14px "Bebas Neue", sans-serif';
    ctx.letterSpacing = '1px';
    ctx.fillText(NOTAS[i].toFixed(1), r-12, 5);
    ctx.restore();
  }
  // Center circle
  ctx.beginPath();
  ctx.arc(cx,cy,26,0,2*Math.PI);
  const g = ctx.createRadialGradient(cx,cy,4,cx,cy,26);
  g.addColorStop(0,'#2a2a38');
  g.addColorStop(1,'#16161f');
  ctx.fillStyle = g;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Center dot
  ctx.beginPath();
  ctx.arc(cx,cy,6,0,2*Math.PI);
  ctx.fillStyle = '#f5c842';
  ctx.fill();
}

function getNotaAtPointer(finalAngle) {
  const n = NOTAS.length;
  const arc = (2*Math.PI)/n;
  const norm = ((-finalAngle - Math.PI/2) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
  return NOTAS[Math.floor(norm/arc) % n];
}

function addAlumno() {
  const inp = document.getElementById('alumnoInput');
  const nombre = inp.value.trim();
  if (!nombre) return;
  alumnos.push({nombre, nota: null});
  inp.value = '';
  renderList();
  updateNextLabel();
  inp.focus();
}

function removeAlumno(i) {
  alumnos.splice(i,1);
  renderList();
  updateNextLabel();
}

function updateNextLabel() {
  const el = document.getElementById('nextLabel');
  const pending = alumnos.filter(a=>a.nota===null);
  if (!alumnos.length) { el.innerHTML='Agrega un alumno y gira ✦'; return; }
  if (!pending.length) { el.innerHTML='✅ ¡Todos tienen nota!'; return; }
  el.innerHTML = `Siguiente: <strong>${pending[0].nombre}</strong>`;
}

function renderList() {
  const el = document.getElementById('alumnosList');
  if (!alumnos.length) { el.innerHTML='<div class="empty-msg">Aún no hay alumnos 📋</div>'; return; }
  el.innerHTML = alumnos.map((a,i)=>`
    <div class="alumno-item">
      <span class="alumno-name">${a.nombre}</span>
      <div class="item-right">
        ${a.nota!==null
          ? `<span class="nota-pill ${notaClass(a.nota)}">${a.nota.toFixed(1)}</span>`
          : `<span class="nota-pill pending">pendiente</span>`}
        <button class="del-btn" onclick="removeAlumno(${i})">×</button>
      </div>
    </div>
  `).join('');
}

function spin() {
  if (spinning) return;
  const pending = alumnos.filter(a=>a.nota===null);
  if (!pending.length) { alert(alumnos.length?'¡Todos ya tienen nota!':'Agrega alumnos primero'); return; }
  const alumno = pending[0];
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('resultAlumno').textContent = alumno.nombre;
  document.getElementById('resultNota').textContent = '🎲';
  document.getElementById('resultNota').className = 'result-nota-big';

  const extraSpins = (7+Math.floor(Math.random()*5))*2*Math.PI;
  const randOffset = Math.random()*2*Math.PI;
  const finalAngle = angle + extraSpins + randOffset;
  const duration = 4200;
  const t0 = performance.now();
  const a0 = angle;

  function animate(now) {
    const t = Math.min((now-t0)/duration,1);
    const ease = 1 - Math.pow(1-t,4);
    angle = a0 + (finalAngle-a0)*ease;
    drawWheel(angle);
    if (t<1) { requestAnimationFrame(animate); return; }
    spinning = false;
    document.getElementById('spinBtn').disabled = false;
    const nota = getNotaAtPointer(angle);
    alumno.nota = nota;
    renderList();
    updateNextLabel();
    const rn = document.getElementById('resultNota');
    rn.textContent = nota.toFixed(1);
    rn.className = 'result-nota-big ' + notaClass(nota);
    confettiBurst();
  }
  requestAnimationFrame(animate);
}

function confettiBurst() {
  const cont = document.getElementById('confettiContainer');
  const colors = ['#f5c842','#ff6b4a','#5b8cff','#4bcc7e','#c97aff','#ff6b9d'];
  for (let i=0; i<40; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left:${30+Math.random()*40}%;
      top:${10+Math.random()*20}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${6+Math.random()*8}px;
      height:${6+Math.random()*8}px;
      border-radius:${Math.random()>0.5?'50%':'2px'};
      animation-duration:${0.8+Math.random()*0.8}s;
      animation-delay:${Math.random()*0.3}s;
      transform-origin:center;
    `;
    cont.appendChild(el);
    el.addEventListener('animationend', ()=>el.remove());
  }
}

function limpiarNotas() {
  alumnos.forEach(a=>a.nota=null);
  renderList(); updateNextLabel();
  document.getElementById('resultNota').textContent='—';
  document.getElementById('resultNota').className='result-nota-big';
  document.getElementById('resultAlumno').textContent='— ningún alumno —';
}

function exportar() {
  if (!alumnos.length) return;
  const rows = ['Alumno,Nota',...alumnos.map(a=>`${a.nombre},${a.nota!==null?a.nota.toFixed(1):'—'}`)];
  const blob = new Blob([rows.join('\n')],{type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'notas.csv'; a.click();
}

drawWheel(angle);
</script>
</body>
</html>
